name: Deploy to Proxmox LXC

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: anomaly-wiki-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Write production .env
        run: |
          umask 077
          cat > .env <<'EOF'
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}

          RABBITMQ_DEFAULT_USER=${{ secrets.RABBITMQ_DEFAULT_USER }}
          RABBITMQ_DEFAULT_PASS=${{ secrets.RABBITMQ_DEFAULT_PASS }}

          MINIO_ROOT_USER=${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD }}

          OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g

          INTERNAL_TOKEN=${{ secrets.INTERNAL_TOKEN }}

          NEXT_PUBLIC_GATEWAY_URL=${{ secrets.NEXT_PUBLIC_GATEWAY_URL }}
          GATEWAY_INTERNAL_URL=http://api-gateway:8000
          EOF

      - name: Prepare auth keys
        run: |
          mkdir -p services/researcher-auth-service/secrets

          if [ ! -f services/researcher-auth-service/secrets/rsa_private.pem ]; then
            openssl genrsa -out services/researcher-auth-service/secrets/rsa_private.pem 2048
          fi

          chmod 600 services/researcher-auth-service/secrets/rsa_private.pem

      - name: Validate compose
        run: |
          docker compose config --quiet

      - name: Deploy stack
        run: |
          docker compose up -d --build --remove-orphans

      - name: Check API gateway
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8000/ready >/dev/null; then
              echo "api-gateway ready"
              exit 0
            fi
            sleep 5
          done

          docker compose ps
          docker compose logs --tail=200 api-gateway
          exit 1

      - name: Check frontend
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000 >/dev/null; then
              echo "frontend ready"
              exit 0
            fi
            sleep 3
          done

          docker compose ps
          docker compose logs --tail=200 frontend
          exit 1

      - name: Cleanup dangling images
        run: |
          docker image prune -f

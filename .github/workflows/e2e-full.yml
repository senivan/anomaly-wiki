name: E2E Full Tests

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read

jobs:
  e2e-full:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      COMPOSE_PROJECT_NAME: anomaly-wiki-e2e-full
      E2E_ENABLE_SEARCH_INDEXING: "0"
      INTERNAL_TOKEN: e2e-internal-token

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: e2e/requirements.txt

      - name: Prepare auth keys
        run: |
          mkdir -p services/researcher-auth-service/secrets
          openssl genrsa -out services/researcher-auth-service/secrets/rsa_private.pem 2048

      - name: Validate compose config
        run: docker compose config --quiet

      - name: Build and start stack
        run: docker compose up -d --build

      - name: Wait for gateway readiness
        run: |
          for attempt in {1..90}; do
            status="$(curl -sS -o /tmp/gateway-ready.json -w '%{http_code}' http://localhost:8000/ready || true)"
            if [ "$status" = "200" ]; then
              cat /tmp/gateway-ready.json
              exit 0
            fi
            echo "Gateway not ready yet (attempt ${attempt}/90, status=${status})"
            cat /tmp/gateway-ready.json 2>/dev/null || true
            sleep 5
          done
          docker compose ps
          docker compose logs --no-color
          exit 1

      - name: Install E2E dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r e2e/requirements.txt

      - name: Run full E2E tests
        run: python -m pytest -ra e2e/full

      - name: Collect compose diagnostics
        if: always()
        run: |
          mkdir -p e2e-artifacts
          docker compose ps > e2e-artifacts/compose-ps.txt
          docker compose logs --no-color > e2e-artifacts/compose.log
          curl -sS http://localhost:8000/ready > e2e-artifacts/gateway-ready.json || true
          curl -sS http://localhost:9200/_cluster/health > e2e-artifacts/opensearch-health.json || true
          curl -sS http://localhost:9000/minio/health/live > e2e-artifacts/minio-health.txt || true

      - name: Upload E2E diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-full-diagnostics
          path: e2e-artifacts

      - name: Stop stack
        if: always()
        run: docker compose down -v --remove-orphans

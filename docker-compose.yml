services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      POSTGRES_DB: ${POSTGRES_DB:-anomaly_wiki}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 5s
      timeout: 10s
      retries: 12

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-admin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && exec 3<&-"]
      interval: 5s
      timeout: 10s
      retries: 12

  opensearch:
    image: opensearchproject/opensearch:2.11.0
    environment:
      discovery.type: single-node
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: ${OPENSEARCH_JAVA_OPTS:--Xms1g -Xmx1g}
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health?local=true"]
      interval: 5s
      timeout: 10s
      retries: 24

  researcher-auth-service:
    build:
      context: .
      dockerfile: services/researcher-auth-service/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./services/researcher-auth-service/secrets:/etc/secrets/auth:ro
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin}@db:5432/auth_db
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).close()\""]
      interval: 5s
      timeout: 5s
      retries: 10

  encyclopedia-service:
    build:
      context: .
      dockerfile: services/encyclopedia/Dockerfile
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ENCYCLOPEDIA_SERVICE_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin}@db:5432/encyclopedia_db
      ENCYCLOPEDIA_SERVICE_RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest}@rabbitmq:5672/
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/ready', timeout=2).close()\""]
      interval: 5s
      timeout: 5s
      retries: 10

  media-service:
    build:
      context: .
      dockerfile: services/media-service/Dockerfile
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      MEDIA_SERVICE_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin}@db:5432/media_db
      MEDIA_SERVICE_OBJECT_STORAGE_ENDPOINT: minio:9000
      MEDIA_SERVICE_OBJECT_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-admin}
      MEDIA_SERVICE_OBJECT_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-admin123}
      MEDIA_SERVICE_OBJECT_STORAGE_BUCKET: anomaly-media
      MEDIA_SERVICE_OBJECT_STORAGE_SECURE: "false"
      MEDIA_SERVICE_PUBLIC_STORAGE_BASE_URL: http://localhost:9000
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/ready', timeout=2).close()\""]
      interval: 5s
      timeout: 5s
      retries: 10

  search-service:
    build:
      context: .
      dockerfile: services/search-service/Dockerfile
    depends_on:
      opensearch:
        condition: service_healthy
    environment:
      SEARCH_SERVICE_OPENSEARCH_URL: http://opensearch:9200
      SEARCH_SERVICE_OPENSEARCH_INDEX: anomaly-wiki-pages
      SEARCH_SERVICE_INTERNAL_TOKEN: ${INTERNAL_TOKEN:?INTERNAL_TOKEN must be set}
    expose:
      - "8000"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/readiness', timeout=2).close()\""]
      interval: 5s
      timeout: 5s
      retries: 10

  search-indexer:
    build:
      context: .
      dockerfile: services/search-indexer/Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      encyclopedia-service:
        condition: service_healthy
      search-service:
        condition: service_healthy
    environment:
      SEARCH_INDEXER_RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest}@rabbitmq:5672/
      SEARCH_INDEXER_OPENSEARCH_URL: http://opensearch:9200
      SEARCH_INDEXER_OPENSEARCH_INDEX: anomaly-wiki-pages
      SEARCH_INDEXER_ENCYCLOPEDIA_URL: http://encyclopedia-service:8000
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    restart: on-failure

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    depends_on:
      researcher-auth-service:
        condition: service_healthy
      encyclopedia-service:
        condition: service_healthy
      media-service:
        condition: service_healthy
      search-service:
        condition: service_healthy
    environment:
      API_GATEWAY_RESEARCHER_AUTH_BASE_URL: http://researcher-auth-service:8000
      API_GATEWAY_ENCYCLOPEDIA_BASE_URL: http://encyclopedia-service:8000
      API_GATEWAY_MEDIA_SERVICE_BASE_URL: http://media-service:8000
      API_GATEWAY_SEARCH_SERVICE_BASE_URL: http://search-service:8000
      API_GATEWAY_SEARCH_INTERNAL_TOKEN: ${INTERNAL_TOKEN:?INTERNAL_TOKEN must be set}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_GATEWAY_URL: ${NEXT_PUBLIC_GATEWAY_URL}
    environment:
      NODE_ENV: production
      GATEWAY_INTERNAL_URL: http://api-gateway:8000
    depends_on:
      api-gateway:
        condition: service_started
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
  rabbitmq_data:
  minio_data:
  opensearch_data:

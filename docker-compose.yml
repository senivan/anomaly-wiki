services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      POSTGRES_DB: ${POSTGRES_DB:-anomaly_wiki}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-admin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && exec 3<&-"]
      interval: 30s
      timeout: 10s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.11.0
    environment:
      discovery.type: single-node
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: ${OPENSEARCH_JAVA_OPTS:--Xms1g -Xmx1g}
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health?local=true"]
      interval: 30s
      timeout: 10s
      retries: 5

  researcher-auth-service:
    build:
      context: .
      dockerfile: services/researcher-auth-service/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./services/researcher-auth-service/secrets:/etc/secrets/auth:ro
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin}@db:5432/auth_db

  encyclopedia-service:
    build:
      context: .
      dockerfile: services/encyclopedia/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      ENCYCLOPEDIA_SERVICE_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin}@db:5432/encyclopedia_db
    ports:
      - "8001:8000"

  media-service:
    build:
      context: .
      dockerfile: services/media-service/Dockerfile
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      MEDIA_SERVICE_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin}@db:5432/media_db
      MEDIA_SERVICE_OBJECT_STORAGE_ENDPOINT: minio:9000
      MEDIA_SERVICE_OBJECT_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-admin}
      MEDIA_SERVICE_OBJECT_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-admin123}
      MEDIA_SERVICE_OBJECT_STORAGE_BUCKET: anomaly-media
      MEDIA_SERVICE_OBJECT_STORAGE_SECURE: "false"
    ports:
      - "8002:8000"
  search-service:
    build:
      context: .
      dockerfile: services/search-service/Dockerfile
    depends_on:
      opensearch:
        condition: service_healthy
    environment:
      SEARCH_SERVICE_OPENSEARCH_URL: http://opensearch:9200
      SEARCH_SERVICE_OPENSEARCH_INDEX: anomaly-wiki-pages
      SEARCH_SERVICE_INTERNAL_TOKEN: ${INTERNAL_TOKEN:-}
    expose:
      - "8000"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/readiness')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    depends_on:
      researcher-auth-service:
        condition: service_started
      encyclopedia-service:
        condition: service_started
      media-service:
        condition: service_started
      search-service:
        condition: service_healthy
    environment:
      API_GATEWAY_RESEARCHER_AUTH_BASE_URL: http://researcher-auth-service:8000
      API_GATEWAY_ENCYCLOPEDIA_BASE_URL: http://encyclopedia-service:8000
      API_GATEWAY_MEDIA_SERVICE_BASE_URL: http://media-service:8000
      API_GATEWAY_SEARCH_SERVICE_BASE_URL: http://search-service:8000
      API_GATEWAY_SEARCH_INTERNAL_TOKEN: ${INTERNAL_TOKEN:-}
    ports:
      - "8000:8000"

volumes:
  postgres_data:
  rabbitmq_data:
  minio_data:
  opensearch_data:
